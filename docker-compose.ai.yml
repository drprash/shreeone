# Full stack with local AI (Ollama + Gemma 4 E4B).
# Use this file when you want AI features enabled.
#
# Usage:
#   With AI:    docker compose -f docker-compose.ai.yml up -d
#   Without AI: docker compose up -d

services:
  llm:
    image: ollama/ollama
    container_name: shreeone-llm
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c",
      "ollama serve & sleep 5 && ollama pull gemma4:e4b && wait"]
    networks:
      - shreeone-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: shreeone-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - shreeone-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: shreeone-api
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      FRONTEND_URL: ${FRONTEND_URL}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://llm:11434}
      LLM_MODEL: ${LLM_MODEL:-gemma4:e4b}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-90}
      # --- Cloud LLM providers (optional — uncomment and set in .env to enable) ---
      # LLM_PROVIDER: ${LLM_PROVIDER:-local}
      # OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      # GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      # GOOGLE_AI_MODEL: ${GOOGLE_AI_MODEL:-gemini-2.0-flash}
    networks:
      - shreeone-network
    depends_on:
      db:
        condition: service_healthy
      llm:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: shreeone-web
    ports:
      - "5173:5173"
    networks:
      - shreeone-network
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:

networks:
  shreeone-network:
    driver: bridge
